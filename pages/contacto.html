<head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<body>
    <header class="header">
        <a href="../index.html"><img class="header__logo" src="../img/logo-ebook-shop.svg" alt="Logo de la Tienda ebook Shop" /></a>
        <nav class="nav">
            <ul class="nav__list"></ul>
            <li><a class="nav__link" href="../index.html">Inicio</a></li>
            <li><a class="nav__link nav__link--active" href="./contacto.html">Contacto</a></li>
            <li><a class="nav__link" href="./carrito.html">Carrito</a></li>
            </ul>
        </nav>
    </header>
    <main class="main">
        <section class="box-titulo">
            <h1 class="titulo text-secondary">Contacto</h1>
        </section>

        <section>
            <h2 class="titulo-section">Completa el formulario</h2>
            <!-- modify this form HTML and place wherever you want your form -->
            <form class="form" action="https://formspree.io/f/xaqlapav" method="POST">
                <div class="form-input">
                    <label class="form__label">
                        Correo electrónico:
                        <input class="form__input" type="email" name="email" />
                    </label>
                </div>
                <div class="form-input">
                    <label class="form__label">
                        Tu mensaje:
                        <textarea rows="8" class="form__textarea" name="message"></textarea>
                    </label>
                </div>
                <!-- your other form fields go here -->
                <button class="btn btn-primary form__button" type="submit">Enviar mensaje</button>
            </form>
        </section>
    </main>

    <footer class="footer ">
        <p>© 2026 eBook Shop. Todos los derechos reservados.</p>

            <ul>
                <li><a href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram" alt="Logo de Instagram"></i></a></li>
                <li><a href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook" alt="Logo de Facebook"></i></a></li>
                <li><a href="https://api.whatsapp.com/" target="_blank"><i class="fab fa-whatsapp" alt="Logo de WhatsApp"></i></a></li>
            </ul>
        </nav>
    </footer>
